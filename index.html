<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vakit360 | Kapsamlı İslami Yaşam Rehberi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        vakit: {
                            dark: '#0f172a',
                            light: '#1e293b',
                            accent: '#10b981'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .blob-1 {
            background: #10b981;
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            background: #3b82f6;
            width: 300px;
            height: 300px;
            bottom: -50px;
            right: -50px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.1); opacity: 0.25; }
        }

        .store-btn {
            transition: all 0.3s ease;
        }
        
        .store-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative px-6">
    
    <!-- Arka plan animasyonları -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <main class="w-full max-w-2xl mx-auto flex flex-col items-center justify-center text-center z-10 glass-panel p-10 rounded-3xl shadow-2xl">
        
        <!-- İkon / Logo Alanı -->
        <div class="w-24 h-24 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-3xl flex items-center justify-center mb-8 shadow-lg shadow-emerald-500/30">
            <i class="fa-solid fa-moon text-4xl text-white"></i>
        </div>

        <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">
            <span class="gradient-text">Vakit360</span>
        </h1>
        
        <p class="text-slate-300 text-lg md:text-xl mb-10 leading-relaxed max-w-lg">
            Namaz vakitleri, Kuran-ı Kerim, kıble pusulası ve daha fazlası. Kusursuz bir İslami yaşam rehberi cebinizde.
        </p>

        <div class="flex flex-col sm:flex-row gap-5 w-full justify-center">
            
            <!-- App Store Butonu -->
            <a href="#" class="store-btn flex items-center justify-center gap-3 bg-white text-slate-900 px-6 py-4 rounded-2xl font-medium w-full sm:w-auto">
                <i class="fa-brands fa-apple text-3xl"></i>
                <div class="text-left">
                    <div class="text-xs font-semibold text-slate-500 line-clamp-1 uppercase tracking-wider">İndirmek için</div>
                    <div class="text-lg font-bold leading-none">App Store</div>
                </div>
            </a>

            <!-- Google Play Butonu -->
            <a href="#" class="store-btn flex items-center justify-center gap-3 bg-white text-slate-900 px-6 py-4 rounded-2xl font-medium w-full sm:w-auto">
                <i class="fa-brands fa-google-play text-2xl text-emerald-600"></i>
                <div class="text-left">
                    <div class="text-xs font-semibold text-slate-500 line-clamp-1 uppercase tracking-wider">Hemen Alın</div>
                    <div class="text-lg font-bold leading-none">Google Play</div>
                </div>
            </a>

        </div>
    </main>

    <footer class="mt-12 text-slate-500 text-sm font-medium z-10">
        &copy; 2026 Vakit360. Tüm hakları saklıdır.
    </footer>

</body>
</html>
